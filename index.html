<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClubOps – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="login">

<div class="login-root">
  <!-- Brand Side -->
  <div class="login-brand">
    <div class="logo-mark"><img height="40px" src="logo.jpeg" alt="logo"></div>
    <h1>Club<span>Ops</span></h1>
    <p>The all-in-one club administration platform for managing events, budgets, and resources seamlessly.</p>
  </div>

  <!-- Login Panel -->
  <div class="login-panel">
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your ClubOps account</p>

    <!-- Role Selector -->
    <div class="role-selector">
      <button class="role-btn active" data-role="ADMIN">🛡️ Admin</button>
      <button class="role-btn" data-role="CLUB_HEAD">🎓 Club Head</button>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
      </div>
      <p class="login-error" id="login-error"></p>
      <button type="submit" class="btn-primary">Sign In →</button>
    </form>

    <div class="login-footer">
      <p style="margin-bottom:8px;color:var(--text-muted);font-size:0.8rem;">Demo Credentials</p>
      <p><strong>Admin:</strong> admin@clubops.edu / admin123</p>
      <p><strong>Club Head:</strong> priya@clubops.edu / club123</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
